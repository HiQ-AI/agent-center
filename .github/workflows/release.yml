# 版本 tag 触发发布。消费方零 token(npx @hiq-ai/agent-center-mcp 即用)。
#   1. npm —— `npm publish` 走 Trusted Publishing(OIDC),无 npm token、无仓库 secret:
#            GitHub Actions 经 OIDC(`id-token: write`)向 npm 证明身份,自动生成 provenance。
#            一次性前置:包需先存在(手动首发一次),再在包的 npmjs.com 设置里把本仓+workflow
#            加为 Trusted Publisher。
#   2. GitHub Release —— 附打包 tarball。
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run check
      - name: Publish to npm (Trusted Publishing — no token)
        run: npm publish --access public --provenance
      - name: Pack tarball for the GitHub Release
        id: pack
        run: echo "tgz=$(npm pack --silent)" >> "$GITHUB_OUTPUT"
      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "${{ steps.pack.outputs.tgz }}" \
            --title "$GITHUB_REF_NAME" --generate-notes --verify-tag \
          || gh release upload "$GITHUB_REF_NAME" "${{ steps.pack.outputs.tgz }}" --clobber
